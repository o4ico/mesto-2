<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body class="page">

  <header class="header">
    <img class="header__logo" src="./images/Logo.svg">
  </header>

  <main class="main">

    <section class="profile">
      <div class="profile__container">

        <div class="profile__avatar-button">
          <img class="profile__avatar" src="./images/Avatar.jpg" alt="Аватар">
        </div>

        <div class="profile__info">
          <h1 class="profile__title">Жак-Ив Кусто</h1>
          <p class="profile__subtitle">Исследователь океана</p>
        </div>

        <button class="profile__edit-button" type="button"></button>

      </div>

      <button class="profile__add-button" type="button"></button>
      
    </section>

    <section class="cards">
      <article class="card">
        <img class="card__image" src="./images/kirill-pershin-1088404-unsplash.jpg" alt="Фото Карачаевск">
        <div class="card__caption">
          <h3 class="card__text">Карачаевск</h3>
          <button class="card__like-button" type="button"></button>
        </div>
      </article>

      <article class="card">
        <img class="card__image" src="./images/kirill-pershin-1404681-unsplash.jpg" alt="Фото Эльбрус">
        <div class="card__caption">
          <h3 class="card__text">Гора Эльбрус</h3>
          <button class="card__like-button" type="button"></button>
        </div>
      </article>

      <article class="card">
        <img class="card__image" src="./images/kirill-pershin-1556355-unsplash.jpg" alt="Фото Домбай">
        <div class="card__caption">
          <h3 class="card__text">Домбай</h3>
          <button class="card__like-button" type="button"></button>
        </div>
      </article>

      <article class="card">
        <img class="card__image" src="./images/kirill-pershin-1404681-unsplash.jpg" alt="Фото Эльбрус">
        <div class="card__caption">
          <h3 class="card__text">Гора Эльбрус</h3>
          <button class="card__like-button" type="button"></button>
        </div>
      </article>

      <article class="card">
        <img class="card__image" src="./images/kirill-pershin-1556355-unsplash.jpg" alt="Фото Домбай">
        <div class="card__caption">
          <h3 class="card__text">Домбай</h3>
          <button class="card__like-button" type="button"></button>
        </div>
      </article>

      <article class="card">
        <img class="card__image" src="./images/kirill-pershin-1088404-unsplash-1.jpg" alt="Фото Карачаево-Черкесия">
        <div class="card__caption">
          <h3 class="card__text">Карачаево-Черкесия</h3>
          <button class="card__like-button" type="button"></button>
        </div>
      </article>

    </section>
  </main>

  <footer class="footer">
    <p class="footer__author">&#169; 2023 Mesto Russia</p>
  </footer>
  <script src="./scripts/index.js"></script>
</body>
</html>
