<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body class="page">

  <header class="header">
    <img class="header__logo" src="./images/Logo.svg">
  </header>

  <main class="main">

    <section class="profile">
      
      <div class="profile__container">

        <div class="profile__avatar-button">
          <img class="profile__avatar" src="./images/Avatar.jpg" alt="Аватар">
        </div>

        <div class="profile__info">
          <div class="profile__name-block">
            <h1 class="profile__title">Жак-Ив Кусто</h1>
            <button class="profile__edit-button" type="button"></button>
          </div>
          <p class="profile__subtitle">Исследователь океана</p>
        </div>
      </div>

      <button class="profile__add-button" type="button"></button>
      
    </section>

    <section class="cards">
      
      <template id="card-template">
        <article class="card">
          <button class="card__delete-button" type="button"></button>
          <img class="card__image" src="#" alt="Фото">
          <div class="card__caption">
            <h3 class="card__text"></h3>
            <button class="card__like-button" type="button"></button>
          </div>
        </article>
      </template>
      
    </section>
  </main>

  <footer class="footer">
    <p class="footer__author">&#169; 2023 Mesto Russia</p>
  </footer>

  <section class="popup popup_edit-profile">
    <div class="popup__container">

      <button class="popup__close-button" type="button"></button>
      <h3 class="popup__title">Редактировать профиль</h3>
      <form class="popup__form" name="edit-form" novalidate>
        <input class="popup__input popup__input_name" type="text" placeholder="Имя">
        <input class="popup__input popup__input_about-me" type="text" placeholder="О себе">
        <input class="popup__submit-button popup__submit-button_edit-profile" type="submit" value="Сохранить">
      </form>
    </div>
  </section>

  <section class="popup popup_add-card">
    <div class="popup__container">

      <button class="popup__close-button" type="button"></button>
      <h3 class="popup__title">Новое место</h3>
      <form class="popup__form" name="add-form" novalidate>
        <input class="popup__input popup__input_place" type="text" placeholder="Название">
        <input class="popup__input popup__input_link" type="text" placeholder="Ссылка на картинку">
        <input class="popup__submit-button popup__submit-button_add-card" type="submit" value="Сохранить">
      </form>
    </div>
  </section>

  <section class="popup popup_image">
    <div class="popup__container popup__container_image">
      <button class="popup__close-button popup__close-button_image" type="button"></button>
      <img class="popup__image" src="#" alt="Фото">
      <h3 class="popup__image-title">Фото</h3>
    </div>

  </section>

  <script src="./scripts/cards.js"></script>
  <script src="./scripts/index.js"></script>
  
</body>
</html>
